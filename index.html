<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>e-cdn · free cdn for everyone</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="page">

  <!-- HEADER -->
  <header>
    <div class="logo-wrap">
      <div class="logo"><span>e</span>-cdn</div>
      <span class="logo-badge">public beta</span>
    </div>
    <p class="tagline">
      A <span class="hl">free, open CDN</span> for your projects.<br>
      Drop in a <code>&lt;script&gt;</code> tag and you're done.
    </p>
  </header>

  <!-- CONTROLS -->
  <div class="controls">
    <div class="search-wrap">
      <input id="search" type="text" placeholder="search libraries...">
    </div>
    <div class="tags-row" id="tag-filter"></div>
    <span class="count-label" id="count-label"></span>
  </div>

  <!-- GRID -->
  <div class="grid-wrap">
    <div class="section-label">available packages</div>
    <div class="grid" id="grid"></div>
    <div class="empty" id="empty" style="display:none">
      <span class="emoji">∅</span>
      nothing found matching "<span id="empty-q"></span>"
    </div>
  </div>

  <!-- FOOTER -->
  <footer>
    <div class="footer-left">
      built by <a href="https://github.com/e-cdn" target="_blank">e-cdn</a> ·
      <a href="https://github.com/e-cdn/e-cdn.github.io" target="_blank">source</a>
    </div>
    <div class="footer-right">
      <span class="status-dot"></span>
      all systems operational
    </div>
  </footer>

</div>

<!-- MODAL -->
<div class="modal-bg" id="modal-bg">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div class="modal-name" id="m-name"></div>
      <div class="modal-tags" id="m-tags"></div>
      <button class="modal-close" id="modal-close">✕</button>
    </div>
    <div class="modal-body">
      <p class="modal-desc" id="m-desc"></p>
      <div id="m-snippets"></div>
      <div class="modal-links" id="m-links"></div>
    </div>
  </div>
</div>
<script src="script.js"></script>
</body>
</html>
